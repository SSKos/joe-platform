# ── joe.kk-about.me nginx configuration ─────────────────────────────────────
# This is a SNIPPET — place it in the directory that portfolio_nginx includes.
# Check where with: docker inspect portfolio_nginx | grep -A 20 '"Mounts"'
#
# After adding this file, obtain SSL cert (see DEPLOY_JOE.md Section 5),
# then reload nginx: docker exec portfolio_nginx nginx -s reload

# Phase 1 — HTTP only (used during certbot webroot challenge).
# After the certificate is obtained, this block handles the redirect.
server {
    listen 80;
    server_name joe.kk-about.me;

    # Certbot webroot challenge — must be reachable before cert exists
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Phase 2 — HTTPS (activate after certbot issues the certificate)
server {
    listen 443 ssl;
    http2 on;
    server_name joe.kk-about.me;

    ssl_certificate     /etc/letsencrypt/live/joe.kk-about.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/joe.kk-about.me/privkey.pem;

    # Standard certbot SSL options — these files are created by certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # File upload size limit — 10 MB matches Multer config in the app
    client_max_body_size 10M;

    # API routes — proxied to Express backend
    location /api/ {
        proxy_pass         http://joe_backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Everything else — Express serves the React SPA and uploaded files
    location / {
        proxy_pass         http://joe_backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
